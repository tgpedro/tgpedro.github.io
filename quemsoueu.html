<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="true">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Quem Sou Eu?">
    <title>Quem Sou Eu?</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --ios-red: #FF3B30;
            --ios-gray: #8E8E93;
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: var(--ios-bg);
            color: #000;
            overflow: hidden;
            position: fixed;
        }

        /* --- SCREENS --- */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            z-index: 10;
            background-color: var(--ios-bg);
        }

        .screen.active {
            display: flex;
            animation: screenFadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes screenFadeIn {
            from { opacity: 0; transform: scale(1.05); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- HOME SCREEN --- */
        .home-screen {
            padding: calc(40px + var(--safe-top)) 20px var(--safe-bottom);
            overflow-y: auto;
            background: linear-gradient(180deg, #FFFFFF 0%, #F2F2F7 100%);
        }

        .app-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .app-header h1 {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .app-header p {
            color: var(--ios-gray);
            font-size: 18px;
            font-weight: 500;
        }

        .categories-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            padding-bottom: 40px;
        }

        .category-card {
            background: var(--ios-card);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            aspect-ratio: 0.85;
        }

        .category-card:active {
            transform: scale(0.92);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .cat-img {
            width: 100%;
            height: 65%;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .cat-img::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 40%;
            background: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
        }

        .cat-info {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .cat-info h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .cat-info span {
            font-size: 13px;
            color: var(--ios-gray);
            font-weight: 600;
        }

        /* --- GAME SCREEN --- */
        .game-screen {
            background-color: var(--ios-blue);
            color: white;
            justify-content: center;
            align-items: center;
            transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .game-screen.correct { background-color: var(--ios-green) !important; }
        .game-screen.wrong { background-color: var(--ios-red) !important; }

        /* iOS Back Button */
        .ios-back {
            position: absolute;
            top: calc(20px + var(--safe-top));
            left: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            z-index: 100;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ios-back:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.4);
        }

        .ios-back svg {
            width: 12px;
            height: 20px;
            margin-right: 2px;
        }

        .game-timer {
            position: absolute;
            top: calc(30px + var(--safe-top));
            font-size: 32px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
            opacity: 0.9;
        }

        .word-box {
            width: 100%;
            padding: 0 60px;
            text-align: center;
            perspective: 1200px;
        }

        .word-text {
            font-size: 84px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -2px;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            text-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        /* Animations */
        .anim-up { transform: translateY(-150vh) rotateX(45deg); opacity: 0; }
        .anim-down { transform: translateY(150vh) rotateX(-45deg); opacity: 0; }
        .anim-in { animation: wordIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes wordIn {
            from { transform: scale(0.4) translateY(50px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* --- COUNTDOWN --- */
        .countdown-screen {
            background: white;
            justify-content: center;
            align-items: center;
        }

        .count-num {
            font-size: 160px;
            font-weight: 900;
            color: var(--ios-blue);
            animation: countPulse 1s infinite;
        }

        @keyframes countPulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- GAME OVER --- */
        .game-over-screen {
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .result-box {
            background: white;
            width: 100%;
            max-width: 400px;
            border-radius: 36px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .result-box h2 {
            font-size: 34px;
            font-weight: 800;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: flex;
            justify-content: space-around;
            margin-bottom: 40px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-val {
            font-size: 52px;
            font-weight: 900;
        }

        .stat-label {
            font-size: 14px;
            font-weight: 700;
            color: var(--ios-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-restart {
            background: var(--ios-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 22px;
            border-radius: 22px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,122,255,0.3);
        }

        /* --- ORIENTATION --- */
        .landscape-hint {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            color: white;
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
        }

        .landscape-hint svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            animation: rotatePhone 2s infinite ease-in-out;
        }

        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }

        @media (orientation: portrait) {
            .game-screen .landscape-hint { display: flex; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- HOME -->
        <div id="homeScreen" class="screen active home-screen">
            <div class="app-header">
                <h1>Quem Sou Eu?</h1>
                <p>Escolha uma categoria para jogar</p>
            </div>
            <div id="categoriesGrid" class="categories-container"></div>
        </div>

        <!-- COUNTDOWN -->
        <div id="countdownScreen" class="screen countdown-screen">
            <div id="countNum" class="count-num">3</div>
        </div>

        <!-- GAME -->
        <div id="gameScreen" class="screen game-screen">
            <div class="ios-back" onclick="exitGame()">
                <svg viewBox="0 0 12 21" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10.5 19.5L1.5 10.5L10.5 1.5" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>

            <div class="landscape-hint">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <rect x="5" y="2" width="14" height="20" rx="2" />
                    <path d="M12 18h.01" />
                </svg>
                <h2>Vire o celular!</h2>
                <p>Para jogar, segure o celular na horizontal contra a sua testa.</p>
            </div>

            <div id="gameTimer" class="game-timer">75s</div>
            
            <div class="word-box">
                <div id="wordText" class="word-text">PREPARE-SE</div>
            </div>
        </div>

        <!-- GAME OVER -->
        <div id="gameOverScreen" class="screen game-over-screen">
            <div class="result-box">
                <h2>Resultado</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span id="resCorrect" class="stat-val" style="color: var(--ios-green)">0</span>
                        <span class="stat-label">Acertos</span>
                    </div>
                    <div class="stat-item">
                        <span id="resWrong" class="stat-val" style="color: var(--ios-red)">0</span>
                        <span class="stat-label">Erros</span>
                    </div>
                </div>
                <button class="btn-restart" onclick="location.reload()">Início</button>
            </div>
        </div>
    </div>

    <script>
        const CATEGORIES = [
            { id: "celebridades", name: "Celebridades", img: "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=400", words: ["Cristiano Ronaldo", "Messi", "Neymar", "Shakira", "Beyoncé", "Taylor Swift", "The Weeknd", "Bad Bunny", "Billie Eilish", "Drake", "Ariana Grande", "Dwayne Johnson", "Tom Cruise", "Leonardo DiCaprio", "Scarlett Johansson", "Anitta", "Ivete Sangalo", "Silvio Santos"] },
            { id: "filmes", name: "Filmes", img: "https://images.unsplash.com/photo-1485846234645-a62644f84728?w=400", words: ["Avatar", "Titanic", "Homem-Aranha", "Vingadores", "Interestelar", "Matrix", "Inception", "Gladiador", "Jurassic Park", "De Volta para o Futuro", "Forrest Gump", "O Iluminado", "Psicose", "Pulp Fiction", "Kill Bill", "Star Wars", "Harry Potter", "Coringa"] },
            { id: "series", name: "Séries", img: "https://images.unsplash.com/photo-1522869635100-9f4c5e86aa37?w=400", words: ["Game of Thrones", "Breaking Bad", "Stranger Things", "The Office", "Friends", "Wandinha", "Round 6", "Dark", "The Crown", "Sherlock", "Dexter", "House", "Grey's Anatomy", "Suits", "Peaky Blinders", "The Boys", "Succession"] },
            { id: "animais", name: "Animais", img: "https://images.unsplash.com/photo-1518939565613-37f1b92e99b5?w=400", words: ["Leão", "Tigre", "Golfinho", "Pinguim", "Águia", "Cobra", "Elefante", "Girafa", "Urso Panda", "Lobo", "Raposa", "Macaco", "Tubarão", "Coruja", "Pavão", "Canguru", "Hipopótamo", "Zebra"] },
            { id: "comida", name: "Comida", img: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400", words: ["Pizza", "Hambúrguer", "Sushi", "Lasanha", "Coxinha", "Açaí", "Brigadeiro", "Churrasco", "Tacos", "Macarrão", "Feijoada", "Pastel", "Bolo", "Sorvete", "Panqueca", "Pão de Queijo", "Tapioca"] },
            { id: "esportes", name: "Esportes", img: "https://images.unsplash.com/photo-1461896836934-ffe607ba8211?w=400", words: ["Futebol", "Basquete", "Tênis", "Natação", "Boxe", "Skate", "Surfe", "Yoga", "Corrida", "Ciclismo", "Vôlei", "Badminton", "Golfe", "Snowboard", "Escalada", "Karatê", "Judô"] }
        ];

        let gameState = {
            active: false,
            words: [],
            index: 0,
            score: { correct: 0, wrong: 0 },
            timeLeft: 75,
            timer: null,
            isProcessing: false,
            lastActionTime: 0
        };

        // --- SENSOR LOGIC (ROBUST) ---
        // We use a threshold system with a "cooldown" to prevent rapid skipping
        const SENSOR_CONFIG = {
            thresholdCorrect: 110, // Tilt forward
            thresholdWrong: 45,    // Tilt back
            cooldown: 1200         // 1.2s between actions
        };

        function init() {
            const grid = document.getElementById('categoriesGrid');
            CATEGORIES.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'category-card';
                card.innerHTML = `
                    <div class="cat-img" style="background-image: url('${cat.img}')"></div>
                    <div class="cat-info">
                        <h3>${cat.name}</h3>
                        <span>${cat.words.length} PALAVRAS</span>
                    </div>
                `;
                card.onclick = () => startSequence(cat.id);
                grid.appendChild(card);
            });
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startSequence(catId) {
            const cat = CATEGORIES.find(c => c.id === catId);
            gameState.words = [...cat.words].sort(() => Math.random() - 0.5);
            gameState.index = 0;
            gameState.score = { correct: 0, wrong: 0 };
            gameState.timeLeft = 75;
            gameState.active = false;

            showScreen('countdownScreen');
            let count = 3;
            const countEl = document.getElementById('countNum');
            countEl.innerText = count;

            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    countEl.innerText = count;
                } else {
                    clearInterval(interval);
                    startGame();
                }
            }, 1000);

            // iOS Sensor Permission
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().catch(console.error);
            }
        }

        function startGame() {
            gameState.active = true;
            showScreen('gameScreen');
            nextWord(true);
            
            document.getElementById('gameTimer').innerText = gameState.timeLeft + 's';
            gameState.timer = setInterval(() => {
                gameState.timeLeft--;
                document.getElementById('gameTimer').innerText = gameState.timeLeft + 's';
                if (gameState.timeLeft <= 0) endGame();
            }, 1000);
        }

        function nextWord(isFirst = false) {
            const wordEl = document.getElementById('wordText');
            if (!isFirst) gameState.index++;
            
            if (gameState.index >= gameState.words.length) {
                gameState.words.sort(() => Math.random() - 0.5);
                gameState.index = 0;
            }

            wordEl.innerText = gameState.words[gameState.index];
            wordEl.className = 'word-text anim-in';
        }

        function handleAction(type) {
            const now = Date.now();
            if (gameState.isProcessing || !gameState.active || (now - gameState.lastActionTime < SENSOR_CONFIG.cooldown)) return;
            
            gameState.isProcessing = true;
            gameState.lastActionTime = now;

            const screen = document.getElementById('gameScreen');
            const wordEl = document.getElementById('wordText');

            if (type === 'correct') {
                gameState.score.correct++;
                screen.classList.add('correct');
                wordEl.classList.add('anim-up');
                if (window.navigator.vibrate) window.navigator.vibrate(100);
            } else {
                gameState.score.wrong++;
                screen.classList.add('wrong');
                wordEl.classList.add('anim-down');
                if (window.navigator.vibrate) window.navigator.vibrate([50, 50, 50]);
            }

            // Feedback duration: 1 second for better visibility
            setTimeout(() => {
                screen.classList.remove('correct', 'wrong');
                nextWord();
                gameState.isProcessing = false;
            }, 1000);
        }

        function exitGame() {
            clearInterval(gameState.timer);
            gameState.active = false;
            showScreen('homeScreen');
        }

        function endGame() {
            clearInterval(gameState.timer);
            gameState.active = false;
            document.getElementById('resCorrect').innerText = gameState.score.correct;
            document.getElementById('resWrong').innerText = gameState.score.wrong;
            showScreen('gameOverScreen');
        }

        // --- SENSOR EVENT ---
        window.addEventListener('deviceorientation', (e) => {
            if (!gameState.active || gameState.isProcessing) return;

            const beta = e.beta; // Tilt
            
            // Logic:
            // Correct: Phone tilted forward (screen facing down) -> beta > 110
            // Wrong: Phone tilted back (screen facing up) -> beta < 45
            if (beta > SENSOR_CONFIG.thresholdCorrect) {
                handleAction('correct');
            } else if (beta < SENSOR_CONFIG.thresholdWrong && beta > -20) {
                handleAction('wrong');
            }
        });

        // Keyboard Fallback (for testing)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') handleAction('correct');
            if (e.key === 'ArrowDown') handleAction('wrong');
            if (e.key === 'Escape') exitGame();
        });

        init();
    </script>
</body>
</html>

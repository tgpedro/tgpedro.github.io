<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IMPOSTOR | BUG-FREE</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

:root {
  --bg: #050508;
  --card: #0d0e14;
  --primary: #ff003c;
  --primary-glow: rgba(255, 0, 60, 0.4);
  --secondary: #1a1c26;
  --accent: #00f2ff;
  --text: #e0e0e6;
  --text-dim: #62667a;
  --border: #1f2230;
  --safe-area-bottom: env(safe-area-inset-bottom, 20px);
}

* {
  box-sizing: border-box;
  font-family: 'JetBrains Mono', monospace;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

body {
  margin: 0;
  height: 100vh;
  height: -webkit-fill-available;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.app {
  flex: 1;
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
  background: var(--card);
  position: relative;
  display: flex;
  flex-direction: column;
  padding: 20px;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}

header { padding: 15px 0; text-align: center; }
h1 { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900; margin: 0; color: var(--primary); letter-spacing: 4px; text-shadow: 0 0 15px var(--primary-glow); }

.content { flex: 1; overflow-y: auto; padding-bottom: 120px; }

.input-group { display: flex; gap: 8px; margin-bottom: 15px; }
input { flex: 1; padding: 14px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: var(--accent); font-size: 16px; outline: none; }
input:focus { border-color: var(--accent); }

button { cursor: pointer; border: 1px solid transparent; border-radius: 8px; font-weight: 700; text-transform: uppercase; transition: all 0.1s; display: flex; align-items: center; justify-content: center; }
.btn-add { padding: 0 15px; background: transparent; border: 1px solid var(--accent); color: var(--accent); }
.btn-main { width: 100%; padding: 18px; background: var(--primary); color: white; box-shadow: 0 0 20px var(--primary-glow); font-size: 15px; }
.btn-main:active { transform: scale(0.96); filter: brightness(1.2); }
.btn-secondary { width: 100%; padding: 14px; background: var(--secondary); color: var(--text-dim); margin-top: 8px; font-size: 13px; }
.btn-ghost { background: transparent; color: var(--text-dim); font-size: 10px; padding: 8px; margin-top: 15px; width: 100%; border: none; }

.player-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 12px 15px; margin-bottom: 6px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; animation: slideIn 0.2s ease-out; }
@keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
.remove-btn { color: var(--primary); font-size: 11px; padding: 5px; }

.screen { display: flex; flex-direction: column; height: 100%; text-align: center; justify-content: center; }
.label-small { text-transform: uppercase; letter-spacing: 2px; color: var(--accent); font-size: 10px; margin-bottom: 8px; }
.display-name { font-family: 'Orbitron', sans-serif; font-size: 36px; font-weight: 900; margin: 15px 0; color: white; }

.info-box { background: rgba(0,0,0,0.5); border: 1px solid var(--border); padding: 35px 15px; margin: 15px 0; border-radius: 4px; position: relative; }
.info-box::before { content: ""; position: absolute; top: -1px; left: -1px; width: 15px; height: 15px; border-top: 2px solid var(--primary); border-left: 2px solid var(--primary); }

.category-tag { color: var(--accent); font-size: 11px; margin-bottom: 8px; display: block; }
.secret-word { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 900; color: white; word-break: break-word; }
.impostor-text { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 900; color: var(--primary); animation: blink 1s infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.footer-actions { position: absolute; bottom: 0; left: 0; right: 0; padding: 15px; padding-bottom: calc(var(--safe-area-bottom) + 10px); background: linear-gradient(transparent, var(--card) 40%); z-index: 50; }

.reveal-list { text-align: left; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
.reveal-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
.role-impostor { color: var(--primary); font-weight: bold; }
.role-agent { color: var(--accent); }

.hidden { display: none !important; }
</style>
</head>

<body>
<main class="app">
  <header><h1>IMPOSTOR</h1></header>

  <div class="content">
    <!-- SETUP -->
    <section id="setup">
      <div class="input-group">
        <input id="playerInput" placeholder="NOME DO AGENTE" autocomplete="off">
        <button id="addBtn" class="btn-add">ADD</button>
      </div>
      <div id="count" style="font-size: 9px; color: var(--text-dim); margin-bottom: 10px; letter-spacing: 1px;">0 AGENTES ATIVOS</div>
      <div class="players-list" id="playersList"></div>
      
      <div style="margin-top: 15px;">
        <button class="btn-secondary" id="exampleBtn">CARREGAR EQUIPE TESTE</button>
        <button class="btn-ghost" id="clearBtn">WIPE_ALL_DATA</button>
      </div>
    </section>

    <!-- PASS SCREEN -->
    <section id="passScreen" class="hidden screen">
      <div class="label-small">TRANSFERIR DISPOSITIVO</div>
      <div class="display-name" id="currentName"></div>
      <div style="color: var(--text-dim); font-size: 11px;">AGUARDANDO AUTENTICAÇÃO BIOMÉTRICA...</div>
    </section>

    <!-- SECRET SCREEN -->
    <section id="secretScreen" class="hidden screen">
      <div class="label-small">DADOS DESCRIPTOGRAFADOS</div>
      <div class="info-box" id="secretContent"></div>
    </section>

    <!-- END SCREEN -->
    <section id="endScreen" class="hidden screen">
      <div class="label-small">OPERAÇÃO EM CURSO</div>
      <div class="info-box">
        <div class="category-tag">CATEGORIA DO ARQUIVO</div>
        <div class="secret-word" id="finalCategory"></div>
      </div>
      
      <button id="showRevealBtn" class="btn-secondary">REVELAR IDENTIDADES</button>
      
      <div id="revealArea" class="hidden reveal-list">
        <div class="label-small">RELATÓRIO DE CAMPO</div>
        <div id="revealContent"></div>
      </div>
    </section>
  </div>

  <div class="footer-actions">
    <button id="startBtn" class="btn-main">INICIAR OPERAÇÃO</button>
    <button id="revealBtn" class="btn-main hidden">ACESSAR DADOS</button>
    <button id="hideBtn" class="btn-main hidden">CONFIRMAR E PASSAR</button>
    <button id="newRoundBtn" class="btn-main hidden">NOVA RODADA</button>
    <button id="restartBtn" class="btn-secondary hidden">ABORTAR</button>
  </div>
</main>

<script>
const categories = [
  {name:"COMIDA",words:["PIZZA","HAMBÚRGUER","SUSHI","LASANHA","COXINHA","PASTEL","BOLO","BRIGADEIRO","PIPOCA","TACO","MACARRÃO","CHURRASCO","AÇAÍ","SORVETE","PANQUECA","BATATA FRITA","HOT DOG","PUDIM","FEIJOADA","STROGONOFF"]},
  {name:"ANIMAIS",words:["GATO","CACHORRO","LEÃO","TIGRE","GIRAFA","ELEFANTE","MACACO","COELHO","PINGUIM","TUBARÃO","GOLFINHO","CORUJA","COBRA","CAVALO","URSO","JACARÉ","RATO","LOBO","RAPOSA","BORBOLETA"]},
  {name:"LUGARES",words:["PRAIA","SHOPPING","CINEMA","ESCOLA","HOSPITAL","AEROPORTO","PARQUE","MERCADO","IGREJA","MUSEU","BIBLIOTECA","RESTAURANTE","ACADEMIA","RODOVIÁRIA","HOTEL","FARMÁCIA","ESTÁDIO","BALADA","TEATRO","ZOOLÓGICO"]},
  {name:"OBJETOS",words:["CELULAR","ÓCULOS","CHAVE","MOCHILA","GARRAFA","CONTROLE","CADEIRA","RELÓGIO","ESPELHO","CANETA","CADERNO","FONE","CARREGADOR","TRAVESSEIRO","GUARDA-CHUVA","ESCOVA","VENTILADOR","TELEVISÃO","NOTEBOOK","ANEL"]},
  {name:"FILMES E SÉRIES",words:["BARBIE","AVATAR","SHREK","VINGADORES","WANDINHA","STRANGER THINGS","HARRY POTTER","TITANIC","INTERESTELAR","CORALINE","TOY STORY","HOMEM-ARANHA","JOGOS VORAZES","ROUND 6","BREAKING BAD","FRIENDS","DIVERTIDAMENTE","MATRIX","CREPÚSCULO","THE LAST OF US"]},
  {name:"INTERNET",words:["MEME","TIKTOK","REELS","EMOJI","STALKER","INFLUENCER","TREND","COMENTÁRIO","LIKE","VÍDEO","LIVE","PRINT","FILTRO","FOFOCA","PERFIL","STORY","VIRAL","HASHTAG","PODCAST","CANCELAMENTO"]}
];

let players = [];
let currentIndex = 0;
let impostorIndex = 0;
let chosenCategory = null;
let chosenWord = "";
let lastWord = ""; // Para evitar repetição imediata

const screens = {
  setup: document.getElementById("setup"),
  pass: document.getElementById("passScreen"),
  secret: document.getElementById("secretScreen"),
  end: document.getElementById("endScreen")
};

const btns = {
  start: document.getElementById("startBtn"),
  reveal: document.getElementById("revealBtn"),
  hide: document.getElementById("hideBtn"),
  newRound: document.getElementById("newRoundBtn"),
  restart: document.getElementById("restartBtn")
};

function showScreen(screenId) {
  Object.values(screens).forEach(s => s.classList.add("hidden"));
  screens[screenId].classList.remove("hidden");
  
  Object.values(btns).forEach(b => b.classList.add("hidden"));
  if(screenId === 'setup') btns.start.classList.remove("hidden");
  if(screenId === 'pass') { btns.reveal.classList.remove("hidden"); btns.restart.classList.remove("hidden"); }
  if(screenId === 'secret') btns.hide.classList.remove("hidden");
  if(screenId === 'end') { btns.newRound.classList.remove("hidden"); btns.restart.classList.remove("hidden"); }
  
  // Resetar área de revelação ao mudar de tela
  if(screenId !== 'end') {
    document.getElementById("revealArea").classList.add("hidden");
  }
}

function renderPlayers(){
  const list = document.getElementById("playersList");
  list.innerHTML = "";
  document.getElementById("count").textContent = players.length + " AGENTES ATIVOS";
  players.forEach((name, i) => {
    const div = document.createElement("div");
    div.className = "player-card";
    div.innerHTML = `<span>${name.toUpperCase()}</span><span class="remove-btn" onclick="removePlayer(${i})">REMOVER</span>`;
    list.appendChild(div);
  });
}

function removePlayer(i) { players.splice(i, 1); renderPlayers(); }

function addPlayer(){
  const input = document.getElementById("playerInput");
  const val = input.value.trim().toUpperCase();
  
  if(!val) return;
  if(players.includes(val)) { alert("ERRO: AGENTE JÁ REGISTRADO."); return; }
  
  players.push(val);
  input.value = "";
  renderPlayers();
}

document.getElementById("addBtn").onclick = addPlayer;
document.getElementById("playerInput").onkeydown = (e) => { if(e.key === 'Enter') addPlayer(); };

function prepareRound(){
  // Evitar repetição da mesma palavra
  let newCategory, newWord;
  do {
    newCategory = categories[Math.floor(Math.random()*categories.length)];
    newWord = newCategory.words[Math.floor(Math.random()*newCategory.words.length)];
  } while (newWord === lastWord);
  
  chosenCategory = newCategory;
  chosenWord = newWord;
  lastWord = newWord;
  impostorIndex = Math.floor(Math.random()*players.length);
  currentIndex = 0;
}

btns.start.onclick = () => {
  if(players.length < 3) { alert("ERRO: MÍNIMO 3 AGENTES NECESSÁRIOS."); return; }
  prepareRound();
  showPass();
};

function showPass(){
  document.getElementById("currentName").textContent = players[currentIndex];
  showScreen('pass');
}

btns.reveal.onclick = () => {
  const content = document.getElementById("secretContent");
  if(currentIndex === impostorIndex){
    content.innerHTML = `<div class="category-tag">ARQUIVO: ${chosenCategory.name}</div><div class="impostor-text">VOCÊ É O IMPOSTOR</div>`;
  } else {
    content.innerHTML = `<div class="category-tag">ARQUIVO: ${chosenCategory.name}</div><div class="secret-word">${chosenWord}</div>`;
  }
  showScreen('secret');
};

btns.hide.onclick = () => {
  currentIndex++;
  if(currentIndex >= players.length) {
    document.getElementById("finalCategory").textContent = chosenCategory.name;
    showScreen('end');
  } else {
    showPass();
  }
};

document.getElementById("showRevealBtn").onclick = () => {
  const area = document.getElementById("revealArea");
  const content = document.getElementById("revealContent");
  content.innerHTML = players.map((p, i) => `
    <div class="reveal-item">
      <span>${p}</span>
      <span class="${i === impostorIndex ? 'role-impostor' : 'role-agent'}">
        ${i === impostorIndex ? 'IMPOSTOR' : chosenWord}
      </span>
    </div>
  `).join('');
  area.classList.toggle("hidden");
};

btns.newRound.onclick = () => { prepareRound(); showPass(); };
btns.restart.onclick = () => { showScreen('setup'); };
document.getElementById("clearBtn").onclick = () => { if(confirm("CONFIRMAR WIPE TOTAL?")) { players = []; renderPlayers(); } };
document.getElementById("exampleBtn").onclick = () => { players = ["ALPHA", "BRAVO", "CHARLIE", "DELTA"]; renderPlayers(); };

renderPlayers();
</script>
</body>
</html>

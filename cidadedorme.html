<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cidade Dorme - Jogo Social de Mistério</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --accent-red: #8b1a1a;
            --accent-blue: #1a4a6a;
            --accent-gold: #5a4a2a;
            --text-primary: #d4af37;
            --text-secondary: #999999;
            --border-color: #3a3a3a;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #000000 0%, #0a0a0a 50%, #1a0a1a 100%);
            color: var(--text-primary);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Efeito de filme antigo */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 0, 0, 0.15),
                    rgba(0, 0, 0, 0.15) 1px,
                    transparent 1px,
                    transparent 2px
                ),
                radial-gradient(ellipse at 50% 50%, rgba(255, 255, 255, 0.03) 0%, transparent 100%);
            pointer-events: none;
            z-index: 999;
        }

        .container {
            width: 100%;
            height: 100%;
            max-width: 1200px;
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.98) 0%, rgba(20, 10, 20, 0.98) 100%);
            border: 3px solid rgba(90, 74, 42, 0.4);
            box-shadow: 
                0 0 100px rgba(139, 26, 26, 0.3),
                inset 0 0 100px rgba(0, 0, 0, 0.8),
                0 0 50px rgba(26, 74, 106, 0.2);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Vinheta nas bordas */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 50% 50%, transparent 0%, rgba(0, 0, 0, 0.6) 100%);
            pointer-events: none;
            z-index: 1;
        }

        .screen {
            display: none;
            flex: 1;
            padding: 60px 40px;
            position: relative;
            z-index: 2;
            animation: screenFadeIn 1s ease-out;
            overflow-y: auto;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        @keyframes screenFadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes glitch {
            0% { text-shadow: 2px 2px 0 rgba(139, 26, 26, 0.4), -2px -2px 0 rgba(26, 74, 106, 0.4); }
            20% { text-shadow: -2px 2px 0 rgba(139, 26, 26, 0.4), 2px -2px 0 rgba(26, 74, 106, 0.4); }
            40% { text-shadow: 2px -2px 0 rgba(139, 26, 26, 0.4), -2px 2px 0 rgba(26, 74, 106, 0.4); }
            60% { text-shadow: -2px -2px 0 rgba(139, 26, 26, 0.4), 2px 2px 0 rgba(26, 74, 106, 0.4); }
            80% { text-shadow: 1px 1px 0 rgba(139, 26, 26, 0.4), -1px -1px 0 rgba(26, 74, 106, 0.4); }
            100% { text-shadow: 2px 2px 0 rgba(139, 26, 26, 0.4), -2px -2px 0 rgba(26, 74, 106, 0.4); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.8; }
        }

        .title {
            font-size: 5rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--text-primary);
            text-shadow: 
                0 0 30px rgba(90, 74, 42, 0.6),
                0 0 60px rgba(139, 26, 26, 0.3),
                3px 3px 0 rgba(0, 0, 0, 0.8);
            letter-spacing: 3px;
            animation: glitch 0.3s ease-in-out;
            font-family: 'Arial Black', sans-serif;
        }

        .subtitle {
            font-size: 1.3rem;
            color: var(--text-secondary);
            margin-bottom: 50px;
            font-style: italic;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .input-field {
            padding: 15px 20px;
            background: rgba(26, 26, 26, 0.8);
            border: 2px solid rgba(90, 74, 42, 0.5);
            border-radius: 2px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Courier New', monospace;
            min-width: 280px;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--text-primary);
            box-shadow: 
                inset 0 0 20px rgba(0, 0, 0, 0.5),
                0 0 30px rgba(90, 74, 42, 0.5);
            background: rgba(26, 26, 26, 0.95);
        }

        .btn {
            padding: 15px 35px;
            background: linear-gradient(135deg, rgba(90, 74, 42, 0.8) 0%, rgba(70, 54, 22, 0.8) 100%);
            border: 2px solid var(--text-primary);
            border-radius: 2px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            box-shadow: 
                0 0 20px rgba(90, 74, 42, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            background: linear-gradient(135deg, rgba(110, 94, 62, 0.9) 0%, rgba(90, 74, 42, 0.9) 100%);
            box-shadow: 
                0 0 40px rgba(90, 74, 42, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-danger {
            border-color: var(--accent-red);
            color: var(--accent-red);
            box-shadow: 
                0 0 20px rgba(139, 26, 26, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .btn-danger:hover {
            box-shadow: 
                0 0 40px rgba(139, 26, 26, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .players-list {
            margin: 30px 0;
            max-width: 600px;
            max-height: 400px;
            overflow-y: auto;
        }

        .player-item {
            background: rgba(26, 26, 26, 0.6);
            border: 1px solid rgba(90, 74, 42, 0.3);
            padding: 15px 20px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.3);
        }

        .player-item:hover {
            background: rgba(26, 26, 26, 0.8);
            border-color: var(--text-primary);
            box-shadow: 
                inset 0 0 10px rgba(0, 0, 0, 0.3),
                0 0 15px rgba(90, 74, 42, 0.3);
        }

        .player-name {
            font-size: 1.1rem;
            color: var(--text-primary);
            font-weight: bold;
        }

        .btn-remove {
            background: rgba(139, 26, 26, 0.3);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            padding: 6px 12px;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }

        .btn-remove:hover {
            background: rgba(139, 26, 26, 0.6);
            box-shadow: 0 0 15px rgba(139, 26, 26, 0.4);
        }

        /* TELA DE REVELAÇÃO */
        .role-reveal-container {
            max-width: 700px;
            text-align: center;
        }

        .role-instruction {
            font-size: 1.4rem;
            margin-bottom: 40px;
            color: var(--text-secondary);
            font-style: italic;
            letter-spacing: 2px;
        }

        .current-player-name {
            font-size: 2rem;
            color: var(--text-primary);
            margin-bottom: 40px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(90, 74, 42, 0.5);
        }

        .role-card {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.9) 0%, rgba(36, 26, 26, 0.9) 100%);
            border: 3px solid rgba(90, 74, 42, 0.5);
            padding: 60px 40px;
            margin-bottom: 40px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 
                inset 0 0 30px rgba(0, 0, 0, 0.5),
                0 0 30px rgba(139, 26, 26, 0.2);
        }

        .role-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.3) 100%);
            pointer-events: none;
        }

        .role-card.hidden {
            background: linear-gradient(135deg, rgba(36, 26, 26, 0.95) 0%, rgba(26, 26, 36, 0.95) 100%);
            border-color: var(--text-primary);
            box-shadow: 
                inset 0 0 30px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(90, 74, 42, 0.4);
        }

        .role-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .role-card.hidden .role-label {
            opacity: 0;
        }

        .role-name {
            font-size: 3rem;
            font-weight: bold;
            color: var(--text-primary);
            transition: opacity 0.3s ease;
            text-shadow: 0 0 30px rgba(90, 74, 42, 0.5);
            font-family: 'Arial Black', sans-serif;
        }

        .role-card.hidden .role-name {
            opacity: 0;
        }

        .role-card.assassin .role-name {
            color: var(--accent-red);
            text-shadow: 0 0 40px rgba(139, 26, 26, 0.6);
        }

        .role-card.detective .role-name {
            color: var(--accent-blue);
            text-shadow: 0 0 40px rgba(26, 74, 106, 0.6);
        }

        .role-card.innocent .role-name {
            color: var(--text-primary);
            text-shadow: 0 0 40px rgba(90, 74, 42, 0.6);
        }

        .hold-instruction {
            font-size: 1.2rem;
            color: var(--text-primary);
            opacity: 0;
            transition: opacity 0.3s ease;
            font-style: italic;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(90, 74, 42, 0.5);
        }

        .role-card.hidden .hold-instruction {
            opacity: 1;
        }

        .role-progress {
            margin-top: 30px;
            font-size: 0.95rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        /* TELA DE JOGO */
        .game-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .game-header {
            text-align: center;
            padding-bottom: 30px;
            border-bottom: 2px solid rgba(90, 74, 42, 0.3);
            width: 100%;
        }

        .game-round {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .game-status {
            font-size: 1.8rem;
            color: var(--text-primary);
            font-weight: bold;
            text-shadow: 0 0 20px rgba(90, 74, 42, 0.5);
        }

        .phase-container {
            max-width: 800px;
            text-align: center;
            animation: phaseEnter 0.8s ease-out;
        }

        @keyframes phaseEnter {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .phase-title {
            font-size: 3.5rem;
            margin-bottom: 30px;
            font-weight: bold;
            letter-spacing: 3px;
            font-family: 'Arial Black', sans-serif;
            animation: glitch 0.3s ease-in-out, pulse 2s ease-in-out infinite;
        }

        .phase-title.sleep {
            color: var(--accent-blue);
            text-shadow: 0 0 50px rgba(26, 74, 106, 0.5);
        }

        .phase-title.assassin {
            color: var(--accent-red);
            text-shadow: 0 0 50px rgba(139, 26, 26, 0.6);
        }

        .phase-title.detective {
            color: var(--accent-blue);
            text-shadow: 0 0 50px rgba(26, 74, 106, 0.5);
        }

        .phase-title.dawn {
            color: var(--text-primary);
            text-shadow: 0 0 50px rgba(90, 74, 42, 0.5);
        }

        .phase-description {
            font-size: 1.4rem;
            color: var(--text-secondary);
            margin-bottom: 50px;
            line-height: 1.8;
            letter-spacing: 1px;
            font-style: italic;
        }

        .countdown {
            font-size: 4rem;
            color: var(--text-primary);
            font-weight: bold;
            margin: 40px 0;
            font-family: 'Arial Black', sans-serif;
            animation: pulse 1s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(90, 74, 42, 0.6);
        }

        .choices-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            max-width: 700px;
            width: 100%;
        }

        .choice-btn {
            padding: 20px 25px;
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.7) 0%, rgba(36, 26, 26, 0.7) 100%);
            border: 2px solid rgba(90, 74, 42, 0.5);
            border-radius: 2px;
            color: var(--text-primary);
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .choice-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(90, 74, 42, 0.3), transparent);
            transition: left 0.4s ease;
        }

        .choice-btn:hover::before {
            left: 100%;
        }

        .choice-btn:hover {
            background: linear-gradient(135deg, rgba(36, 26, 26, 0.8) 0%, rgba(46, 36, 26, 0.8) 100%);
            border-color: var(--text-primary);
            box-shadow: 
                inset 0 0 15px rgba(0, 0, 0, 0.3),
                0 0 25px rgba(90, 74, 42, 0.4);
            transform: translateY(-3px);
        }

        .choice-btn.selected {
            background: linear-gradient(135deg, rgba(90, 74, 42, 0.9) 0%, rgba(70, 54, 22, 0.9) 100%);
            border-color: var(--text-primary);
            color: var(--text-primary);
            font-weight: bold;
            box-shadow: 
                inset 0 0 15px rgba(0, 0, 0, 0.3),
                0 0 35px rgba(90, 74, 42, 0.6);
        }

        .confirmation-panel {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.8) 0%, rgba(36, 26, 26, 0.8) 100%);
            border: 2px solid var(--text-primary);
            padding: 30px;
            border-radius: 2px;
            margin-bottom: 30px;
            display: none;
            animation: slideUp 0.5s ease-out;
            box-shadow: 0 0 30px rgba(90, 74, 42, 0.4);
        }

        .confirmation-panel.active {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .confirmation-text {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        .confirmation-choice {
            font-size: 1.8rem;
            color: var(--text-primary);
            font-weight: bold;
            margin-bottom: 25px;
            text-shadow: 0 0 20px rgba(90, 74, 42, 0.5);
        }

        .confirmation-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn-confirm, .btn-cancel {
            flex: 1;
            max-width: 200px;
        }

        /* TELA DE RESULTADO */
        .result-container {
            max-width: 700px;
            text-align: center;
        }

        .result-title {
            font-size: 2.5rem;
            margin-bottom: 40px;
            font-weight: bold;
            color: var(--text-primary);
            text-shadow: 0 0 30px rgba(90, 74, 42, 0.5);
            font-family: 'Arial Black', sans-serif;
        }

        .result-card {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.7) 0%, rgba(36, 26, 26, 0.7) 100%);
            border: 2px solid rgba(90, 74, 42, 0.4);
            padding: 25px;
            border-radius: 2px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.3);
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .result-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .result-value {
            font-size: 1.6rem;
            color: var(--text-primary);
            font-weight: bold;
            text-shadow: 0 0 20px rgba(90, 74, 42, 0.4);
        }

        .result-message {
            font-size: 1.3rem;
            color: var(--text-secondary);
            margin: 30px 0;
            line-height: 1.8;
            letter-spacing: 1px;
        }

        /* TELA DE FIM */
        .end-container {
            max-width: 800px;
            text-align: center;
        }

        .end-title {
            font-size: 4rem;
            margin-bottom: 30px;
            font-weight: bold;
            letter-spacing: 3px;
            font-family: 'Arial Black', sans-serif;
            animation: glitch 0.3s ease-in-out, pulse 2s ease-in-out infinite;
        }

        .end-title.victory {
            color: var(--accent-blue);
            text-shadow: 0 0 60px rgba(26, 74, 106, 0.6);
        }

        .end-title.defeat {
            color: var(--accent-red);
            text-shadow: 0 0 60px rgba(139, 26, 26, 0.6);
        }

        .end-message {
            font-size: 1.4rem;
            color: var(--text-secondary);
            margin-bottom: 50px;
            line-height: 1.9;
            letter-spacing: 1px;
        }

        .stats-panel {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.7) 0%, rgba(36, 26, 26, 0.7) 100%);
            border: 2px solid rgba(90, 74, 42, 0.4);
            padding: 30px;
            border-radius: 2px;
            margin-bottom: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.3);
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .stat-value {
            font-size: 2rem;
            color: var(--text-primary);
            font-weight: bold;
            text-shadow: 0 0 20px rgba(90, 74, 42, 0.5);
        }

        .roles-reveal {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.7) 0%, rgba(36, 26, 26, 0.7) 100%);
            border: 2px solid rgba(90, 74, 42, 0.4);
            padding: 30px;
            border-radius: 2px;
            margin-bottom: 40px;
            text-align: left;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.3);
        }

        .roles-reveal-title {
            font-size: 1.3rem;
            color: var(--text-primary);
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(90, 74, 42, 0.4);
            letter-spacing: 2px;
        }

        .role-reveal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(90, 74, 42, 0.2);
        }

        .role-reveal-item:last-child {
            border-bottom: none;
        }

        .role-reveal-name {
            color: var(--text-primary);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .role-reveal-badge {
            padding: 6px 15px;
            border-radius: 2px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid;
        }

        .role-reveal-badge.assassin {
            background: rgba(139, 26, 26, 0.3);
            color: var(--accent-red);
            border-color: var(--accent-red);
        }

        .role-reveal-badge.detective {
            background: rgba(26, 74, 106, 0.3);
            color: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .role-reveal-badge.innocent {
            background: rgba(90, 74, 42, 0.3);
            color: var(--text-primary);
            border-color: var(--text-primary);
        }

        /* RESPONSIVIDADE */
        @media (max-width: 768px) {
            .screen {
                padding: 40px 20px;
            }

            .title {
                font-size: 3rem;
            }

            .phase-title {
                font-size: 2.5rem;
            }

            .phase-description {
                font-size: 1.2rem;
            }

            .countdown {
                font-size: 3rem;
            }

            .choices-container {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 15px;
            }

            .choice-btn {
                padding: 15px 20px;
                font-size: 0.95rem;
            }

            .end-title {
                font-size: 2.5rem;
            }

            .input-field {
                min-width: 200px;
            }
        }

        /* Scrollbar customizada */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(26, 26, 26, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(90, 74, 42, 0.6);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(90, 74, 42, 0.8);
        }

        .narration-display {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid rgba(90, 74, 42, 0.5);
            padding: 15px 20px;
            border-radius: 2px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            max-width: 200px;
            text-align: center;
            box-shadow: 0 0 20px rgba(90, 74, 42, 0.3);
            z-index: 100;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Efeito de transição cinematográfica */
        .screen-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.8) 0%, transparent 50%, rgba(0, 0, 0, 0.8) 100%);
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            animation: transitionEffect 0.8s ease-in-out;
        }

        @keyframes transitionEffect {
            0% {
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }

        /* Partículas de fumaça */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes particleFloat {
            0% {
                opacity: 0;
                transform: translateY(0) translateX(0);
            }
            50% {
                opacity: 0.3;
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) translateX(var(--tx));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- TELA INICIAL -->
        <div class="screen screen-menu active">
            <h1 class="title">CIDADE DORME</h1>
            <p class="subtitle">Um jogo de mistério, suspense e revelações na noite</p>
            
            <div class="input-group">
                <input type="text" class="input-field" id="playerInput" placeholder="Nome do jogador" onkeypress="if(event.key==='Enter') addPlayer()">
                <button class="btn" onclick="addPlayer()">Adicionar</button>
            </div>

            <div class="players-list" id="playersList"></div>

            <div style="margin-top: 40px; display: flex; gap: 20px; justify-content: center;">
                <button class="btn" id="btnDrawRoles" onclick="drawRoles()" disabled>Sortear Papéis</button>
                <button class="btn" id="btnStartGame" onclick="startGame()" disabled>Começar Partida</button>
            </div>
        </div>

        <!-- TELA DE REVELAÇÃO DE PAPÉIS -->
        <div class="screen screen-role-reveal">
            <div class="role-reveal-container">
                <p class="role-instruction">Passe o celular para o jogador</p>
                <p class="current-player-name" id="currentPlayerName"></p>
                
                <div class="role-card hidden" id="roleCard" onmousedown="startReveal()" onmouseup="endReveal()" ontouchstart="startReveal()" ontouchend="endReveal()">
                    <div class="role-label">Seu papel</div>
                    <div class="role-name" id="roleName"></div>
                    <div class="hold-instruction">Segure para revelar</div>
                </div>

                <div class="role-progress" id="roleProgress"></div>

                <button class="btn" onclick="nextPlayerReveal()" id="btnNextReveal" disabled style="margin-top: 30px;">Próximo Jogador</button>
            </div>
        </div>

        <!-- TELA DE JOGO -->
        <div class="screen screen-game">
            <div class="game-container">
                <div class="game-header">
                    <div class="game-round" id="gameRound"></div>
                    <div class="game-status" id="gameStatus"></div>
                </div>

                <div class="phase-container">
                    <div class="phase-title" id="phaseTitle"></div>
                    <div class="phase-description" id="phaseDescription"></div>
                    <div class="countdown" id="countdown" style="display: none;"></div>
                    <div class="choices-container" id="choicesContainer"></div>
                    <div class="confirmation-panel" id="confirmationPanel">
                        <div class="confirmation-text">Você escolheu:</div>
                        <div class="confirmation-choice" id="confirmationChoice"></div>
                        <div class="confirmation-buttons">
                            <button class="btn btn-confirm" onclick="confirmChoice()">Confirmar</button>
                            <button class="btn btn-cancel" onclick="cancelChoice()">Cancelar</button>
                        </div>
                    </div>
                    <button class="btn" id="btnNextPhase" onclick="nextPhase()" style="display: none; margin-top: 30px;">Próxima Fase</button>
                </div>
            </div>
        </div>

        <!-- TELA DE RESULTADO -->
        <div class="screen screen-result">
            <div class="result-container">
                <h2 class="result-title">Resultado da Noite</h2>
                <div class="result-card">
                    <div class="result-label">Vítima</div>
                    <div class="result-value" id="resultVictim">-</div>
                </div>
                <div class="result-card">
                    <div class="result-label">Investigação do Detetive</div>
                    <div class="result-value" id="resultSuspect">-</div>
                </div>
                <div class="result-message" id="resultMessage"></div>
                <button class="btn" onclick="nextRound()" style="margin-top: 30px;">Próxima Rodada</button>
            </div>
        </div>

        <!-- TELA DE FIM DE JOGO -->
        <div class="screen screen-end">
            <div class="end-container">
                <h2 class="end-title" id="endTitle"></h2>
                <p class="end-message" id="endMessage"></p>
                
                <div class="stats-panel">
                    <div class="stat-item">
                        <div class="stat-label">Rodadas</div>
                        <div class="stat-value" id="statRounds">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Mortes</div>
                        <div class="stat-value" id="statDeaths">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Acertos</div>
                        <div class="stat-value" id="statHits">0</div>
                    </div>
                </div>

                <div class="roles-reveal">
                    <div class="roles-reveal-title">Revelação Final</div>
                    <div id="rolesRevealList"></div>
                </div>

                <button class="btn" onclick="backToMenu()" style="margin-top: 30px;">Nova Partida</button>
            </div>
        </div>
    </div>

    <div class="narration-display" id="narrationDisplay" style="display: none;"></div>

    <script>
        // ===== ESTADO DO JOGO =====
        const gameState = {
            players: [],
            roles: {},
            currentPhase: 'menu',
            currentRound: 0,
            assassin: null,
            detective: null,
            alive: [],
            dead: [],
            currentVictim: null,
            currentSuspect: null,
            detectedAssassin: false,
            history: {
                victims: [],
                suspects: [],
                detections: []
            },
            selectedChoice: null,
            currentPlayerRevealIndex: 0,
            isSpeaking: false
        };

        // ===== NARRAÇÃO TEMÁTICA EXPANDIDA =====
        const narration = {
            sleep: [
                "A cidade mergulha no silêncio profundo.",
                "A noite envolve tudo em escuridão absoluta.",
                "O silêncio reina soberano nas ruas vazias.",
                "Todos fecham os olhos. A noite começa.",
                "A escuridão toma conta de tudo.",
                "O repouso chega para a cidade."
            ],
            assassinWake: [
                "Assassino, acorde. É hora de agir.",
                "Assassino, desperte do seu repouso.",
                "Assassino, a noite é sua. Acorde.",
                "Assassino, abra os olhos. O tempo é seu.",
                "Assassino, levante. Escolha seu destino.",
                "Assassino, desperte. A morte o aguarda."
            ],
            assassinChoose: [
                "Escolha sua vítima com cuidado.",
                "Quem será o próximo a cair?",
                "Decida o destino de alguém.",
                "Escolha quem não verá o próximo amanhecer.",
                "Aponte seu alvo. Quem morrerá?",
                "Sua vítima aguarda a escolha."
            ],
            assassinSleep: [
                "Assassino, durma. Seu trabalho está feito.",
                "Assassino, retorne ao repouso.",
                "Assassino, feche os olhos.",
                "Assassino, descanse. Ninguém o verá.",
                "Assassino, durma e guarde seu segredo.",
                "Assassino, o silêncio é seu."
            ],
            detectiveWake: [
                "Detetive, acorde. É hora de investigar.",
                "Detetive, desperte. A verdade o aguarda.",
                "Detetive, abra os olhos. Procure a verdade.",
                "Detetive, levante. Encontre o culpado.",
                "Detetive, desperte. O tempo está contra você.",
                "Detetive, acorde. A justiça depende de você."
            ],
            detectiveChoose: [
                "Escolha um suspeito para investigar.",
                "Quem você desconfia? Escolha com sabedoria.",
                "Aponte seu suspeito. Quem é?",
                "Tente encontrar a verdade antes que seja tarde.",
                "Sua investigação pode salvar a cidade.",
                "Escolha bem. A vida de muitos depende disso."
            ],
            detectiveSleep: [
                "Detetive, durma. Sua investigação terminou.",
                "Detetive, retorne ao repouso.",
                "Detetive, feche os olhos.",
                "Detetive, descanse. Você fez o que pôde.",
                "Detetive, durma e espere pelo amanhecer.",
                "Detetive, o silêncio o envolve."
            ],
            dawn: [
                "A cidade acorda. O amanhecer chega.",
                "O sol nasce sobre a cidade silenciosa.",
                "A noite terminou. A verdade emerge.",
                "Cidade, acordem. Vejam o que a noite trouxe.",
                "O amanhecer revela os segredos da noite.",
                "A luz do dia ilumina a verdade."
            ],
            death: [
                "Houve uma morte nesta noite.",
                "Alguém não sobreviveu à escuridão.",
                "A morte visitou a cidade.",
                "A noite cobrou seu preço.",
                "Um corpo foi encontrado.",
                "A vida se extinguiu na escuridão."
            ],
            investigation: [
                "O detetive investigou alguém.",
                "Uma investigação foi realizada.",
                "O detetive escolheu seu alvo.",
                "A busca pela verdade continua.",
                "O detetive examinou seu suspeito.",
                "A investigação revelou algo."
            ],
            detectionSuccess: [
                "O detetive acertou! O assassino foi descoberto!",
                "A verdade foi revelada! A justiça prevaleceu!",
                "O assassino foi encontrado! A cidade está segura!",
                "Acertou! O culpado foi descoberto!",
                "A investigação foi bem-sucedida!",
                "O assassino não conseguiu se esconder!"
            ],
            detectionFail: [
                "O detetive errou. O assassino permanece oculto.",
                "A investigação não revelou nada.",
                "O assassino continua entre vocês.",
                "A verdade permanece escondida.",
                "A investigação falhou.",
                "O culpado escapou da justiça."
            ]
        };

        // ===== FUNÇÕES AUXILIARES =====
        function getRandomElement(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function showScreen(screenClass) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelector('.' + screenClass).classList.add('active');
        }

        function updatePlayersList() {
            const list = document.getElementById('playersList');
            list.innerHTML = '';
            
            gameState.players.forEach((player, index) => {
                const item = document.createElement('div');
                item.className = 'player-item';
                item.innerHTML = `
                    <span class="player-name">${player}</span>
                    <button class="btn-remove" onclick="removePlayer(${index})">Remover</button>
                `;
                list.appendChild(item);
            });

            const btnDraw = document.getElementById('btnDrawRoles');
            const btnStart = document.getElementById('btnStartGame');
            
            if (gameState.players.length >= 3) {
                btnDraw.disabled = false;
            } else {
                btnDraw.disabled = true;
                btnStart.disabled = true;
            }
        }

        // ===== SISTEMA DE ÁUDIO =====
        let audioContext = null;
        
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioContext;
        }

        // Gerar tom de suspense
        function playAmbientTone() {
            try {
                const ctx = initAudioContext();
                const now = ctx.currentTime;
                
                // Criar osciladores para efeito de suspense
                const osc1 = ctx.createOscillator();
                const osc2 = ctx.createOscillator();
                const gain = ctx.createGain();
                const lfo = ctx.createOscillator();
                const lfoGain = ctx.createGain();
                
                osc1.frequency.value = 80;
                osc2.frequency.value = 120;
                lfo.frequency.value = 0.5;
                
                gain.gain.setValueAtTime(0.1, now);
                lfoGain.gain.setValueAtTime(20, now);
                
                lfo.connect(lfoGain);
                lfoGain.connect(osc1.frequency);
                
                osc1.connect(gain);
                osc2.connect(gain);
                gain.connect(ctx.destination);
                
                osc1.start(now);
                osc2.start(now);
                lfo.start(now);
                
                gain.gain.exponentialRampToValueAtTime(0.01, now + 3);
                osc1.stop(now + 3);
                osc2.stop(now + 3);
                lfo.stop(now + 3);
            } catch (e) {
                console.log('Áudio não disponível');
            }
        }

        // Som de transição
        function playTransitionSound() {
            try {
                const ctx = initAudioContext();
                const now = ctx.currentTime;
                
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.3);
                
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start(now);
                osc.stop(now + 0.3);
            } catch (e) {
                console.log('Áudio não disponível');
            }
        }

        // Som de confirmação
        function playConfirmSound() {
            try {
                const ctx = initAudioContext();
                const now = ctx.currentTime;
                
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start(now);
                osc.stop(now + 0.1);
            } catch (e) {
                console.log('Áudio não disponível');
            }
        }

        // ===== NARRAÇÃO COM VOZ =====
        function narrate(text) {
            if (gameState.isSpeaking) return;
            
            gameState.isSpeaking = true;
            playTransitionSound();
            
            // Mostrar texto na tela
            const display = document.getElementById('narrationDisplay');
            display.textContent = text;
            display.style.display = 'block';
            
            // Usar Web Speech API
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'pt-BR';
                utterance.rate = 0.9;
                utterance.pitch = 1;
                utterance.volume = 1;
                
                utterance.onend = () => {
                    gameState.isSpeaking = false;
                    setTimeout(() => {
                        display.style.display = 'none';
                    }, 1000);
                };
                
                speechSynthesis.cancel();
                speechSynthesis.speak(utterance);
            } else {
                gameState.isSpeaking = false;
                setTimeout(() => {
                    display.style.display = 'none';
                }, 2000);
            }
        }

        // ===== MENU INICIAL =====
        function addPlayer() {
            const input = document.getElementById('playerInput');
            const name = input.value.trim();
            
            if (name && !gameState.players.includes(name)) {
                gameState.players.push(name);
                input.value = '';
                playConfirmSound();
                updatePlayersList();
            }
        }

        function removePlayer(index) {
            gameState.players.splice(index, 1);
            updatePlayersList();
        }

        // ===== SORTEIO DE PAPÉIS =====
        function drawRoles() {
            if (gameState.players.length < 3) {
                alert('É necessário pelo menos 3 jogadores para começar!');
                return;
            }

            gameState.roles = {};
            gameState.alive = [...gameState.players];
            gameState.dead = [];
            gameState.detectedAssassin = false;
            gameState.history = { victims: [], suspects: [], detections: [] };

            const shuffled = [...gameState.players].sort(() => Math.random() - 0.5);
            gameState.assassin = shuffled[0];
            gameState.detective = shuffled[1];
            
            if (gameState.assassin === gameState.detective) {
                gameState.detective = shuffled[2];
            }

            gameState.players.forEach(player => {
                if (player === gameState.assassin) {
                    gameState.roles[player] = 'assassino';
                } else if (player === gameState.detective) {
                    gameState.roles[player] = 'detetive';
                } else {
                    gameState.roles[player] = 'inocente';
                }
            });

            gameState.currentPlayerRevealIndex = 0;
            showScreen('screen-role-reveal');
            showNextPlayerReveal();
        }

        // ===== REVELAÇÃO DE PAPÉIS =====
        function showNextPlayerReveal() {
            if (gameState.currentPlayerRevealIndex >= gameState.players.length) {
                gameState.currentRound = 0;
                startGamePhase();
                return;
            }

            const player = gameState.players[gameState.currentPlayerRevealIndex];
            document.getElementById('currentPlayerName').textContent = player;
            
            const role = gameState.roles[player];
            const roleCard = document.getElementById('roleCard');
            const roleName = document.getElementById('roleName');
            
            roleCard.className = 'role-card hidden ' + role;
            roleName.textContent = role.charAt(0).toUpperCase() + role.slice(1);
            
            const progress = `${gameState.currentPlayerRevealIndex + 1} de ${gameState.players.length}`;
            document.getElementById('roleProgress').textContent = progress;

            const btnNext = document.getElementById('btnNextReveal');
            btnNext.disabled = true;
        }

        function startReveal() {
            const roleCard = document.getElementById('roleCard');
            roleCard.classList.remove('hidden');
        }

        function endReveal() {
            const roleCard = document.getElementById('roleCard');
            roleCard.classList.add('hidden');
            document.getElementById('btnNextReveal').disabled = false;
        }

        function nextPlayerReveal() {
            gameState.currentPlayerRevealIndex++;
            showNextPlayerReveal();
        }

        // ===== INÍCIO DO JOGO =====
        function startGame() {
            if (!gameState.assassin || !gameState.detective || Object.keys(gameState.roles).length === 0) {
                alert('Erro: Papéis não foram sorteados corretamente!');
                return;
            }
            
            gameState.currentRound = 0;
            startGamePhase();
        }

        function startGamePhase() {
            gameState.currentRound++;
            gameState.currentPhase = 'sleep';
            gameState.selectedChoice = null;
            gameState.currentVictim = null;
            gameState.currentSuspect = null;

            createTransitionEffect();
            showScreen('screen-game');
            playAmbientTone();
            createParticles();
            setTimeout(() => playPhase(), 800);
        }

        // Efeito de transição cinematográfica
        function createTransitionEffect() {
            const transition = document.createElement('div');
            transition.className = 'screen-transition';
            document.body.appendChild(transition);
            setTimeout(() => transition.remove(), 800);
        }

        // Criar partículas de fumaça
        function createParticles() {
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.width = (Math.random() * 30 + 10) + 'px';
                particle.style.height = particle.style.width;
                particle.style.background = `radial-gradient(circle, rgba(90, 74, 42, 0.3) 0%, transparent 70%)`;
                particle.style.borderRadius = '50%';
                particle.style.setProperty('--tx', (Math.random() - 0.5) * 100 + 'px');
                particle.style.animation = `particleFloat ${2 + Math.random() * 2}s ease-out forwards`;
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 4000);
            }
        }

        // ===== LÓGICA DE FASES =====
        function playPhase() {
            const phaseTitle = document.getElementById('phaseTitle');
            const phaseDescription = document.getElementById('phaseDescription');
            const choicesContainer = document.getElementById('choicesContainer');
            const confirmationPanel = document.getElementById('confirmationPanel');
            const btnNextPhase = document.getElementById('btnNextPhase');

            choicesContainer.innerHTML = '';
            confirmationPanel.classList.remove('active');
            btnNextPhase.style.display = 'none';

            document.getElementById('gameRound').textContent = `Rodada ${gameState.currentRound}`;
            document.getElementById('gameStatus').textContent = `${gameState.alive.length} jogadores vivos`;

            switch (gameState.currentPhase) {
                case 'sleep':
                    phaseTitle.className = 'phase-title sleep';
                    phaseTitle.textContent = 'CIDADE DORME';
                    const sleepText = getRandomElement(narration.sleep);
                    phaseDescription.textContent = sleepText;
                    narrate(sleepText);
                    startCountdown(4, () => nextPhase());
                    break;

                case 'assassin_wake':
                    phaseTitle.className = 'phase-title assassin';
                    phaseTitle.textContent = 'ASSASSINO';
                    const assassinWakeText = getRandomElement(narration.assassinWake) + '. Passe o celular para o assassino.';
                    phaseDescription.textContent = assassinWakeText;
                    narrate(getRandomElement(narration.assassinWake));
                    btnNextPhase.style.display = 'block';
                    btnNextPhase.textContent = 'Assassino está pronto';
                    break;

                case 'assassin_choose':
                    phaseTitle.className = 'phase-title assassin';
                    phaseTitle.textContent = 'ESCOLHA A VÍTIMA';
                    const assassinChooseText = getRandomElement(narration.assassinChoose);
                    phaseDescription.textContent = assassinChooseText;
                    narrate(assassinChooseText);
                    
                    const possibleVictims = gameState.alive.filter(p => p !== gameState.assassin);
                    if (possibleVictims.length === 0) {
                        phaseDescription.textContent = 'Situação crítica: o jogo chegou a um estado inválido.';
                        btnNextPhase.style.display = 'block';
                        btnNextPhase.textContent = 'Continuar';
                        break;
                    }
                    
                    possibleVictims.forEach(player => {
                        const btn = document.createElement('button');
                        btn.className = 'choice-btn';
                        btn.textContent = player;
                        btn.onclick = () => selectChoice(player, 'victim');
                        choicesContainer.appendChild(btn);
                    });
                    break;

                case 'assassin_sleep':
                    phaseTitle.className = 'phase-title assassin';
                    phaseTitle.textContent = 'ASSASSINO DORME';
                    const assassinSleepText = getRandomElement(narration.assassinSleep);
                    phaseDescription.textContent = assassinSleepText;
                    narrate(assassinSleepText);
                    startCountdown(3, () => nextPhase());
                    break;

                case 'detective_wake':
                    if (!gameState.alive.includes(gameState.detective)) {
                        nextPhase();
                        return;
                    }
                    
                    phaseTitle.className = 'phase-title detective';
                    phaseTitle.textContent = 'DETETIVE';
                    const detectiveWakeText = getRandomElement(narration.detectiveWake) + '. Passe o celular para o detetive.';
                    phaseDescription.textContent = detectiveWakeText;
                    narrate(getRandomElement(narration.detectiveWake));
                    btnNextPhase.style.display = 'block';
                    btnNextPhase.textContent = 'Detetive está pronto';
                    break;

                case 'detective_choose':
                    phaseTitle.className = 'phase-title detective';
                    phaseTitle.textContent = 'ESCOLHA O SUSPEITO';
                    const detectiveChooseText = getRandomElement(narration.detectiveChoose);
                    phaseDescription.textContent = detectiveChooseText;
                    narrate(detectiveChooseText);
                    
                    const possibleSuspects = gameState.alive.filter(p => p !== gameState.detective);
                    if (possibleSuspects.length === 0) {
                        phaseDescription.textContent = 'Você é o único sobrevivente.';
                        btnNextPhase.style.display = 'block';
                        btnNextPhase.textContent = 'Continuar';
                        break;
                    }
                    
                    possibleSuspects.forEach(player => {
                        const btn = document.createElement('button');
                        btn.className = 'choice-btn';
                        btn.textContent = player;
                        btn.onclick = () => selectChoice(player, 'suspect');
                        choicesContainer.appendChild(btn);
                    });
                    break;

                case 'detective_sleep':
                    phaseTitle.className = 'phase-title detective';
                    phaseTitle.textContent = 'DETETIVE DORME';
                    const detectiveSleepText = getRandomElement(narration.detectiveSleep);
                    phaseDescription.textContent = detectiveSleepText;
                    narrate(detectiveSleepText);
                    startCountdown(3, () => nextPhase());
                    break;

                case 'dawn':
                    phaseTitle.className = 'phase-title dawn';
                    phaseTitle.textContent = 'AMANHECER';
                    const dawnText = getRandomElement(narration.dawn);
                    phaseDescription.textContent = dawnText;
                    narrate(dawnText);
                    startCountdown(4, () => nextPhase());
                    break;

                case 'result':
                    showScreen('screen-result');
                    displayResult();
                    break;
            }
        }

        function selectChoice(player, type) {
            gameState.selectedChoice = player;
            playConfirmSound();
            
            if (type === 'victim') {
                gameState.currentVictim = player;
            } else if (type === 'suspect') {
                gameState.currentSuspect = player;
            }

            document.querySelectorAll('.choice-btn').forEach(btn => {
                btn.classList.remove('selected');
                if (btn.textContent === player) {
                    btn.classList.add('selected');
                }
            });

            const confirmationPanel = document.getElementById('confirmationPanel');
            const confirmationChoice = document.getElementById('confirmationChoice');
            confirmationChoice.textContent = player;
            confirmationPanel.classList.add('active');
        }

        function confirmChoice() {
            const confirmationPanel = document.getElementById('confirmationPanel');
            confirmationPanel.classList.remove('active');
            nextPhase();
        }

        function cancelChoice() {
            gameState.selectedChoice = null;
            gameState.currentVictim = null;
            gameState.currentSuspect = null;
            
            document.querySelectorAll('.choice-btn').forEach(btn => {
                btn.classList.remove('selected');
            });

            const confirmationPanel = document.getElementById('confirmationPanel');
            confirmationPanel.classList.remove('active');
        }

        function startCountdown(seconds, callback) {
            const countdownEl = document.getElementById('countdown');
            countdownEl.style.display = 'block';
            let remaining = seconds;
            
            countdownEl.textContent = remaining;
            
            const interval = setInterval(() => {
                remaining--;
                if (remaining > 0) {
                    countdownEl.textContent = remaining;
                } else {
                    clearInterval(interval);
                    countdownEl.style.display = 'none';
                    callback();
                }
            }, 1000);
        }

        function nextPhase() {
            gameState.selectedChoice = null;
            createTransitionEffect();
            
            switch (gameState.currentPhase) {
                case 'sleep':
                    gameState.currentPhase = 'assassin_wake';
                    break;
                case 'assassin_wake':
                    gameState.currentPhase = 'assassin_choose';
                    break;
                case 'assassin_choose':
                    if (!gameState.currentVictim) {
                        alert('O assassino deve escolher uma vítima!');
                        return;
                    }
                    gameState.currentPhase = 'assassin_sleep';
                    break;
                case 'assassin_sleep':
                    gameState.currentPhase = 'detective_wake';
                    break;
                case 'detective_wake':
                    gameState.currentPhase = 'detective_choose';
                    break;
                case 'detective_choose':
                    gameState.currentPhase = 'detective_sleep';
                    break;
                case 'detective_sleep':
                    gameState.currentPhase = 'dawn';
                    break;
                case 'dawn':
                    gameState.currentPhase = 'result';
                    break;
            }
            
            setTimeout(() => playPhase(), 400);
        }

        // ===== RESULTADO DA RODADA =====
        function displayResult() {
            if (gameState.currentVictim && gameState.alive.includes(gameState.currentVictim)) {
                gameState.alive = gameState.alive.filter(p => p !== gameState.currentVictim);
                gameState.dead.push(gameState.currentVictim);
                gameState.history.victims.push(gameState.currentVictim);
            }

            if (gameState.alive.includes(gameState.detective) && gameState.currentSuspect) {
                if (gameState.currentSuspect === gameState.assassin) {
                    gameState.detectedAssassin = true;
                    gameState.history.detections.push(true);
                } else {
                    gameState.history.detections.push(false);
                }
                gameState.history.suspects.push(gameState.currentSuspect);
            } else {
                gameState.history.suspects.push(null);
            }

            document.getElementById('resultVictim').textContent = gameState.currentVictim || 'Ninguém';
            document.getElementById('resultSuspect').textContent = gameState.currentSuspect || 'Ninguém';

            let resultMessage = '';
            if (gameState.currentVictim) {
                resultMessage += getRandomElement(narration.death) + ' ';
            } else {
                resultMessage += 'Ninguém morreu nesta noite. ';
            }
            
            if (gameState.alive.includes(gameState.detective)) {
                if (gameState.currentSuspect) {
                    resultMessage += getRandomElement(narration.investigation) + ' ';
                    if (gameState.currentSuspect === gameState.assassin) {
                        resultMessage += getRandomElement(narration.detectionSuccess);
                    } else {
                        resultMessage += getRandomElement(narration.detectionFail);
                    }
                } else {
                    resultMessage += 'O detetive não investigou ninguém.';
                }
            } else {
                resultMessage += 'O detetive não sobreviveu para investigar.';
            }

            document.getElementById('resultMessage').textContent = resultMessage;
            narrate(resultMessage);

            checkVictoryCondition();
        }

        function checkVictoryCondition() {
            if (!gameState.alive || gameState.alive.length === 0) {
                endGame('defeat', 'assassino');
                return;
            }

            if (gameState.detectedAssassin) {
                endGame('victory', 'inocentes');
                return;
            }

            const aliveCount = gameState.alive.length;
            const assassinAlive = gameState.alive.includes(gameState.assassin);

            if (assassinAlive && aliveCount <= 2) {
                endGame('defeat', 'assassino');
                return;
            }

            const innocentsAlive = gameState.alive.filter(p => 
                p !== gameState.assassin && p !== gameState.detective
            ).length;
            
            const detectiveAlive = gameState.alive.includes(gameState.detective);
            
            if (assassinAlive && innocentsAlive === 0 && !detectiveAlive) {
                endGame('defeat', 'assassino');
                return;
            }

            document.querySelector('.screen-result .btn').style.display = 'block';
        }

        function nextRound() {
            createTransitionEffect();
            setTimeout(() => startGamePhase(), 400);
        }

        // ===== FIM DE JOGO =====
        function endGame(result, winner) {
            showScreen('screen-end');

            const endTitle = document.getElementById('endTitle');
            const endMessage = document.getElementById('endMessage');
            let narrationText = '';

            if (result === 'victory') {
                endTitle.className = 'end-title victory';
                endTitle.textContent = 'INOCENTES VENCEM';
                endMessage.textContent = 'O assassino foi descoberto! A cidade está segura. A justiça prevaleceu e a noite terminou.';
                narrationText = 'Os inocentes venceram! O assassino foi descoberto! A cidade está segura!';
            } else {
                endTitle.className = 'end-title defeat';
                endTitle.textContent = 'ASSASSINO VENCE';
                endMessage.textContent = 'O assassino eliminou todos os inocentes. A cidade caiu na escuridão. O mal triunfou.';
                narrationText = 'O assassino venceu! A cidade caiu na escuridão!';
            }

            narrate(narrationText);

            document.getElementById('statRounds').textContent = gameState.currentRound;
            document.getElementById('statDeaths').textContent = gameState.dead.length;
            document.getElementById('statHits').textContent = gameState.history.detections.filter(d => d).length;

            const rolesList = document.getElementById('rolesRevealList');
            rolesList.innerHTML = '';
            
            gameState.players.forEach(player => {
                const role = gameState.roles[player];
                const item = document.createElement('div');
                item.className = 'role-reveal-item';
                item.innerHTML = `
                    <span class="role-reveal-name">${player}</span>
                    <span class="role-reveal-badge ${role}">${role.toUpperCase()}</span>
                `;
                rolesList.appendChild(item);
            });
        }

        function backToMenu() {
            gameState.players = [];
            gameState.roles = {};
            gameState.currentPhase = 'menu';
            gameState.currentRound = 0;
            gameState.alive = [];
            gameState.dead = [];
            gameState.history = { victims: [], suspects: [], detections: [] };
            
            createTransitionEffect();
            document.getElementById('playerInput').value = '';
            updatePlayersList();
            setTimeout(() => showScreen('screen-menu'), 400);
        }

        // Inicializar
        updatePlayersList();
    </script>
</body>
</html>
